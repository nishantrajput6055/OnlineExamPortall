{% extends "base.html" %}

{% block title %}Welcome - Online Exam Portal{% endblock %}

{% block content %}
<style>
    .hero-section {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 5rem 0;
        text-align: center;
    }
    .hero-section h1 {
        font-size: 3.5rem;
        font-weight: 700;
        margin-bottom: 1rem;
    }
    .hero-section p {
        font-size: 1.3rem;
        margin-bottom: 2rem;
        opacity: 0.95;
    }
    .feature-card {
        text-align: center;
        padding: 2rem;
        border-radius: 15px;
        background: white;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        transition: transform 0.3s ease;
        height: 100%;
    }
    .feature-card:hover {
        transform: translateY(-10px);
    }
    .feature-icon {
        font-size: 3rem;
        color: #667eea;
        margin-bottom: 1rem;
    }
</style>

<div class="hero-section">
    <div class="container">
        <h1><i class="fas fa-graduation-cap"></i> Online Exam Portal</h1>
        <p>Modern, Secure, and User-Friendly Examination Platform</p>
        <div class="d-flex gap-3 justify-content-center">
            <a href="{{ url_for('auth.login') }}" class="btn btn-light btn-lg">
                <i class="fas fa-sign-in-alt"></i> Login
            </a>
            <a href="{{ url_for('auth.register') }}" class="btn btn-outline-light btn-lg">
                <i class="fas fa-user-plus"></i> Register
            </a>
        </div>
    </div>
</div>
