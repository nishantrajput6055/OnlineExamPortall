{% extends "base.html" %}

{% block title %}Edit Question{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card">
                <div class="card-header">
                    <h3><i class="fas fa-edit"></i> Edit Question</h3>
                    <p class="mb-0 text-white-50">Exam: {{ exam.exam_title }}</p>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('admin.edit_question', question_id=question.question_id) }}">
                        <div class="mb-4">
                            <label for="question_text" class="form-label">
                                <i class="fas fa-question-circle"></i> Question Text *
                            </label>
                            <textarea class="form-control" id="question_text" name="question_text" 
                                      rows="3" required>{{ question.question_text }}</textarea>
                        </div>

                        <h5 class="mb-3"><i class="fas fa-list-ul"></i> Answer Options</h5>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="option_a" class="form-label">
                                    <span class="badge bg-primary">A</span> Option A *
                                </label>
                                <input type="text" class="form-control" id="option_a" name="option_a" 
                                       value="{{ question.option_a }}" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="option_b" class="form-label">
                                    <span class="badge bg-primary">B</span> Option B *
                                </label>
                                <input type="text" class="form-control" id="option_b" name="option_b" 
                                       value="{{ question.option_b }}" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="option_c" class="form-label">
                                    <span class="badge bg-primary">C</span> Option C *
                                </label>
                                <input type="text" class="form-control" id="option_c" name="option_c" 
                                       value="{{ question.option_c }}" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="option_d" class="form-label">
                                    <span class="badge bg-primary">D</span> Option D *
                                </label>
                                <input type="text" class="form-control" id="option_d" name="option_d" 
                                       value="{{ question.option_d }}" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="correct_answer" class="form-label">
                                    <i class="fas fa-check-circle"></i> Correct Answer *
                                </label>
                                <select class="form-control" id="correct_answer" name="correct_answer" required>
                                    <option value="A" {% if question.correct_answer == 'A' %}selected{% endif %}>Option A</option>
                                    <option value="B" {% if question.correct_answer == 'B' %}selected{% endif %}>Option B</option>
                                    <option value="C" {% if question.correct_answer == 'C' %}selected{% endif %}>Option C</option>
                                    <option value="D" {% if question.correct_answer == 'D' %}selected{% endif %}>Option D</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="marks" class="form-label">
                                    <i class="fas fa-star"></i> Marks *
                                </label>
                                <input type="number" class="form-control" id="marks" name="marks" 
                                       min="1" max="10" value="{{ question.marks }}" required>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Update Question
                            </button>
                            <a href="{{ url_for('admin.manage_questions', exam_id=question.exam_id) }}" 
                               class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> Back
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
