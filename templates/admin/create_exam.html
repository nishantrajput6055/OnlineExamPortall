{% extends "base.html" %}
<!-- create exam -->

{% block title %}Create Exam - Admin{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">
                    <h3><i class="fas fa-plus-circle"></i> Create New Exam</h3>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('admin.create_exam') }}">
                        <div class="mb-3">
                            <label for="title" class="form-label">
                                <i class="fas fa-heading"></i> Exam Title *
                            </label>
                            <input type="text" class="form-control" id="title" name="title" 
                                   placeholder="Enter exam title" required>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">
                                <i class="fas fa-align-left"></i> Description
                            </label>
                            <textarea class="form-control" id="description" name="description" 
                                      rows="3" placeholder="Enter exam description (optional)"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="duration" class="form-label">
                                    <i class="fas fa-clock"></i> Duration (minutes) *
                                </label>
                                <input type="number" class="form-control" id="duration" name="duration" 
                                       min="5" max="180" placeholder="30" required>
                                <small class="text-muted">5-180 minutes</small>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label for="total_marks" class="form-label">
                                    <i class="fas fa-trophy"></i> Total Marks *
                                </label>
                                <input type="number" class="form-control" id="total_marks" name="total_marks" 
                                       min="1" placeholder="20" required>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label for="passing_marks" class="form-label">
                                    <i class="fas fa-check-double"></i> Passing Marks *
                                </label>
                                <input type="number" class="form-control" id="passing_marks" name="passing_marks" 
                                       min="1" placeholder="12" required>
                            </div>
                        </div>

                        <div class="alert alert-info">
                            <i class="fas fa-info-circle"></i> 
                            After creating the exam, you'll be able to add questions.
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Create Exam
                            </button>
                            <a href="{{ url_for('admin.manage_exams') }}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Validation: passing marks should not exceed total marks
    document.getElementById('total_marks').addEventListener('input', validateMarks);
    document.getElementById('passing_marks').addEventListener('input', validateMarks);

    function validateMarks() {
        const totalMarks = parseInt(document.getElementById('total_marks').value) || 0;
        const passingMarks = parseInt(document.getElementById('passing_marks').value) || 0;

        if (passingMarks > totalMarks) {
            document.getElementById('passing_marks').setCustomValidity('Passing marks cannot exceed total marks');
        } else {
            document.getElementById('passing_marks').setCustomValidity('');
        }
    }
</script>
{% endblock %}
